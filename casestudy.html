<!DOCTYPE html>
<!--
  ============================================================
  FILE: casestudy.html
  VERSION: 3.1
  DATE: 2026-06-12
  PURPOSE: Interactive case study with Supabase, question grid,
           previous/next navigation, answer editing
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Factor Case Study | Tara Air 9N-AET</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
      color: #e0e1dd;
      min-height: 100vh;
    }
    .header {
      background: rgba(13,27,42,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(69,179,255,0.3);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo h1 { font-size: 1.2rem; font-weight: 600; background: linear-gradient(135deg, #fff 0%, #45b3ff 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo p { font-size: 0.6rem; color: #7b8a9b; }
    .player-info { text-align: right; }
    .player-name { font-size: 1rem; font-weight: 600; color: #ffd166; }
    .player-score { font-size: 0.75rem; color: #45b3ff; }
    .timer-display { font-size: 0.9rem; font-family: monospace; color: #ffd166; background: rgba(0,0,0,0.5); padding: 0.3rem 0.8rem; border-radius: 20px; }
    .exit-btn, .cert-btn { background: transparent; border: 1px solid #7b8a9b; color: #7b8a9b; padding: 0.2rem 0.6rem; border-radius: 20px; cursor: pointer; font-size: 0.6rem; margin-left: 0.3rem; }
    .exit-btn:hover, .cert-btn:hover { border-color: #ffd166; color: #ffd166; }
    .main-container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }
    .question-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; background: rgba(27,38,59,0.5); padding: 0.75rem; border-radius: 16px; }
    .grid-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(69,179,255,0.3); background: rgba(13,27,42,0.8); color: #e0e1dd; font-weight: 600; cursor: pointer; }
    .grid-btn:hover { transform: scale(1.05); border-color: #ffd166; }
    .grid-btn.active { background: #45b3ff; color: white; }
    .grid-btn.correct { background: rgba(46,196,182,0.3); border-color: #2ec4b6; color: #2ec4b6; }
    .grid-btn.incorrect { background: rgba(230,57,70,0.3); border-color: #e63946; color: #e63946; }
    .grid-btn.not-answered { background: rgba(13,27,42,0.8); border-color: #7b8a9b; color: #7b8a9b; }
    .progress-section { background: rgba(27,38,59,0.5); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; }
    .progress-bar-container { height: 8px; background: #2a2e3a; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #45b3ff, #2ec4b6); transition: width 0.3s; }
    .progress-text { font-size: 0.7rem; color: #7b8a9b; text-align: right; }
    .question-card { background: rgba(27,38,59,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(69,179,255,0.2); border-radius: 24px; padding: 1.8rem; }
    .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(69,179,255,0.2); }
    .question-number { font-size: 0.7rem; color: #ffd166; }
    .question-points { font-size: 0.7rem; color: #45b3ff; background: rgba(69,179,255,0.1); padding: 0.2rem 0.6rem; border-radius: 20px; }
    .question-framework { font-size: 0.65rem; color: #7b8a9b; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.5rem; }
    .scenario-box { background: rgba(13,27,42,0.5); border-left: 3px solid #45b3ff; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.85rem; line-height: 1.5; }
    .options-grid { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
    .option-radio { display: flex; align-items: center; gap: 0.75rem; background: rgba(13,27,42,0.5); padding: 0.75rem 1rem; border-radius: 12px; cursor: pointer; }
    .option-radio:hover { background: rgba(69,179,255,0.15); }
    .option-radio input { accent-color: #45b3ff; width: 18px; height: 18px; }
    .nav-buttons { display: flex; gap: 1rem; justify-content: space-between; margin-top: 1rem; }
    .btn-nav { background: rgba(69,179,255,0.15); border: 1px solid rgba(69,179,255,0.3); color: #45b3ff; padding: 0.7rem 1.5rem; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .btn-nav:hover { background: rgba(69,179,255,0.3); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-submit { background: linear-gradient(135deg, #45b3ff, #1a6bc3); color: white; border: none; padding: 0.9rem; border-radius: 40px; font-weight: 600; font-size: 1rem; cursor: pointer; flex: 2; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(69,179,255,0.3); }
    .completion-card { text-align: center; padding: 2rem; }
    .completion-icon { width: 70px; height: 70px; background: rgba(46,196,182,0.15); border: 2px solid #2ec4b6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem; }
    .grade-badge { display: inline-block; padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.8rem; font-weight: 600; margin-top: 1rem; }
    .grade-distinction { background: rgba(46,196,182,0.2); color: #2ec4b6; border: 1px solid rgba(46,196,182,0.3); }
    .grade-completed { background: rgba(69,179,255,0.2); color: #45b3ff; border: 1px solid rgba(69,179,255,0.3); }
    .grade-attended { background: rgba(230,57,70,0.2); color: #e63946; border: 1px solid rgba(230,57,70,0.3); }
    .success-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(46,196,182,0.9); color: #000; padding: 0.5rem 1rem; border-radius: 30px; font-size: 0.8rem; font-weight: 600; z-index: 2000; animation: fadeOut 3s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    @media (max-width: 768px) { .main-container { padding: 1rem; } .question-card { padding: 1.2rem; } .grid-btn { width: 32px; height: 32px; font-size: 0.8rem; } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>📋 HUMAN FACTOR CASE STUDY</h1>
    <p>Tara Air 9N-AET | Pokhara → Jomsom • 29 May 2022</p>
  </div>
  <div class="player-info">
    <div class="player-name" id="player-name">Loading...</div>
    <div class="player-score" id="player-score">Score: 0 pts</div>
    <div><button class="cert-btn" onclick="generateCertificate()">🏆 Certificate</button><button class="exit-btn" onclick="exitToJoin()">✕ Exit</button></div>
  </div>
</div>

<div class="main-container" id="main-container"></div>

<script>
  // ========== SUPABASE CONFIG ==========
  const SUPABASE_URL = 'https://etxkdcrmttopdlasqmqk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0eGtkY3JtdHRvcGRsYXNxbXFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODU5MjAsImV4cCI6MjA5Njc2MTkyMH0.RrLVoHefTpHhhgH1Bc_IhZUGGrmmq9QilqDt-QbE6tk';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function getSessionId() { let id = localStorage.getItem('hf-session-id'); if (!id) { id = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); localStorage.setItem('hf-session-id', id); } return id; }

  // ========== QUESTIONS ==========
  const QUESTIONS = [
    { id:1, framework:"Dirty Dozen (Gordon Dupont)", scenario:"On the CVR, the captain is heard expressing hesitation about the weather. However, a passenger or ground crew member is heard 'advising strongly to the PIC to conduct the flight.'", question:"Which Dirty Dozen factor is most clearly at work?", options:["Pressure","Complacency","Lack of assertiveness","Norms"], correct:0, points:10 },
    { id:2, framework:"Normalization of Deviance", scenario:"TAWS was intentionally inhibited due to 'nuisance warnings.' Over time, the crew got used to flying without TAWS.", question:"This reflects which human factors concept?", options:["Plan continuation bias","Normalization of deviance","Confirmation bias","Sunk cost fallacy"], correct:1, points:10 },
    { id:3, framework:"Authority Gradient (CRM)", scenario:"Captain: 17,500 hours. First Officer: 520 hours. Captain assumed most cockpit duties.", question:"What authority gradient issue is most likely at play?", options:["Gradient too flat","Gradient too steep","Gradient optimal","Gradient reversed"], correct:1, points:10 },
    { id:4, framework:"Situational Awareness (Endsley)", scenario:"Aircraft entered IMC while trying to stay VFR. Crew lost positional awareness.", question:"Which level of SA failed first?", options:["Level 1 — Perception","Level 2 — Comprehension","Level 3 — Projection","All three"], correct:2, points:10 },
    { id:5, framework:"Decision-Making Bias", scenario:"Captain criticized others flying VFR in bad weather, yet continued himself.", question:"Which bias best explains this?", options:["Confirmation bias","Anchoring","Plan continuation bias","Overconfidence"], correct:2, points:10 },
    { id:6, framework:"Swiss Cheese Model", scenario:"TAWS inhibited + bad weather + captain hesitant + poor CRM + inexperienced FO + no weather check.", question:"How many defensive layers failed?", options:["2 layers","3 layers","4 layers","5 or more layers"], correct:3, points:10 },
    { id:7, framework:"Psychological Safety (Edmondson)", scenario:"First Officer (520 hrs) did not challenge captain (17,500 hrs).", question:"What does this indicate about psychological safety?", options:["Excellent","FO was incompetent","Low — speaking up felt dangerous","Irrelevant"], correct:2, points:10 },
    { id:8, framework:"Just Culture (Dekker)", scenario:"Captain made poor decision but was not malicious — trying to complete flight.", question:"How should this be classified?", options:["Reckless — sanction","Human error — console","At-risk behaviour — coach","Criminal — prosecute"], correct:2, points:10 },
    { id:9, framework:"Drift into Failure (Dekker)", scenario:"TAWS inhibited for months, weather minima pushed, marginal VFR became normal.", question:"What is this slow erosion called?", options:["Swiss Cheese","Normalization of deviance","Drift into failure","Plan continuation"], correct:2, points:10 },
    { id:10, framework:"The Accident Chain", scenario:"Route economics → Marginal weather policy → No TAWS → Inexperienced FO → Captain hesitation ignored → CFIT.", question:"Where did the accident begin?", options:["Frontline","Cockpit","Executive desk","Regulator"], correct:2, points:10 }
  ];

  let currentPlayer = null, currentIndex = 0, answers = [], sessionEnd = null, timer = null, sessionActive = true;

  function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
  function showMsg(msg) { let d=document.createElement('div'); d.className='success-message'; d.textContent=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }
  function getGrade(s) { if(s>=80) return {name:"Completed with Distinction",class:"grade-distinction",icon:"🏆"}; if(s>=70) return {name:"Completed",class:"grade-completed",icon:"✅"}; return {name:"Attended",class:"grade-attended",icon:"📋"}; }
  function calcScore() { return answers.reduce((s,a)=>s+(a.isCorrect?QUESTIONS[a.idx].points:0),0); }
  function updateScore() { let total=calcScore(); let g=getGrade(total); document.getElementById('player-score').innerHTML=`Score: ${total} pts <span style="font-size:0.65rem;">${g.icon}</span>`; if(currentPlayer) { currentPlayer.score=total; localStorage.setItem('hf-current-player',JSON.stringify(currentPlayer)); } }
  function saveLocal() { localStorage.setItem(`tara-answers-${currentPlayer.id}`,JSON.stringify(answers)); updateScore(); }

  function startTimer() { if(timer) clearInterval(timer); sessionEnd=localStorage.getItem('hf-session-end-time'); if(!sessionEnd){ sessionEnd=Date.now()+30*60*1000; localStorage.setItem('hf-session-end-time',sessionEnd); } timer=setInterval(()=>{ let left=sessionEnd-Date.now(); if(left<=0 && sessionActive) endSession(); else if(sessionActive){ let m=Math.floor(left/60000),s=Math.floor((left%60000)/1000); let el=document.getElementById('timer-display'); if(el) el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`; } },1000); }
  function endSession() { sessionActive=false; clearInterval(timer); renderCompletion(); }

  function loadPlayer() {
    let saved=localStorage.getItem('hf-current-player');
    if(!saved){ window.location.href='index.html'; return; }
    currentPlayer=JSON.parse(saved);
    document.getElementById('player-name').textContent=currentPlayer.name;
    let savedAns=localStorage.getItem(`tara-answers-${currentPlayer.id}`);
    if(savedAns) answers=JSON.parse(savedAns);
    let se=localStorage.getItem('hf-session-end-time');
    if(se && Date.now()>parseInt(se)){ sessionActive=false; renderCompletion(); }
    else{ startTimer(); renderAll(); }
  }

  function getAnswerStatus(idx) { let a=answers.find(a=>a.idx===idx); if(!a) return 'not-answered'; return a.isCorrect?'correct':'incorrect'; }
  function renderGrid() {
    let html='<div class="question-grid">';
    for(let i=0;i<QUESTIONS.length;i++) html+=`<button class="grid-btn ${getAnswerStatus(i)} ${currentIndex===i?'active':''}" onclick="goTo(${i})">${i+1}</button>`;
    html+='</div>';
    let old=document.getElementById('qgrid'); if(old) old.remove();
    let pc=document.getElementById('progress-section');
    if(pc){ let div=document.createElement('div'); div.id='qgrid'; div.innerHTML=html; pc.parentNode.insertBefore(div,pc); }
  }
  function renderProgress() {
    let pc=document.getElementById('progress-section'); if(!pc) return;
    let pct=(answers.length/QUESTIONS.length)*100;
    pc.innerHTML=`<div class="progress-bar-container"><div class="progress-fill" style="width:${pct}%;"></div></div><div class="progress-text">Questions: ${answers.length}/${QUESTIONS.length} | Score: ${calcScore()}/100</div>`;
    renderGrid();
  }
  function goTo(i) { if(i>=0 && i<QUESTIONS.length){ currentIndex=i; renderCurrent(); } }
  window.goTo=goTo;

  function submitAndStay() {
    let sel=document.querySelector('input[name="answer"]:checked');
    if(!sel){ showMsg('⚠️ Please select an answer'); return false; }
    let selIdx=parseInt(sel.value), q=QUESTIONS[currentIndex], isCorrect=(selIdx===q.correct), pts=isCorrect?q.points:0;
    let existing=answers.findIndex(a=>a.idx===currentIndex);
    let newAns={ idx:currentIndex, qid:q.id, answer:selIdx, text:q.options[selIdx], isCorrect:isCorrect, points:pts };
    if(existing!==-1) answers[existing]=newAns; else answers.push(newAns);
    saveLocal();
    showMsg(isCorrect?`✓ Correct! +${pts} points`:`✗ Incorrect. Correct answer: ${q.options[q.correct]}`);
    renderProgress();
    updateScore();
    return true;
  }
  window.submitAnswer = function() { if(submitAndStay()){ if(currentIndex+1<QUESTIONS.length){ currentIndex++; renderCurrent(); } else { renderCompletion(); } } };
  window.prevQ = function() { if(currentIndex>0){ currentIndex--; renderCurrent(); } };
  window.nextQ = function() { if(currentIndex+1<QUESTIONS.length){ currentIndex++; renderCurrent(); } };

  function renderCurrent() {
    let container=document.getElementById('main-container'); if(!container) return;
    let q=QUESTIONS[currentIndex], existing=answers.find(a=>a.idx===currentIndex);
    let left=sessionEnd?Math.max(0,Math.floor((sessionEnd-Date.now())/1000)):1800, m=Math.floor(left/60), s=Math.floor(left%60);
    let optsHtml='';
    q.options.forEach((opt,idx)=>{ let checked=(existing && existing.answer===idx)?'checked':''; optsHtml+=`<label class="option-radio"><input type="radio" name="answer" value="${idx}" ${checked}><span class="option-text">${escapeHtml(opt)}</span></label>`; });
    container.innerHTML=`<div class="progress-section" id="progress-section"></div>
      <div class="question-card">
        <div class="question-header"><span class="question-number">Question ${currentIndex+1}/${QUESTIONS.length}</span><span class="question-points">${q.points} points</span></div>
        <div class="question-framework">${escapeHtml(q.framework)}</div>
        <div class="scenario-box">📖 ${escapeHtml(q.scenario)}</div>
        <div class="question-text">${escapeHtml(q.question)}</div>
        <div class="options-grid">${optsHtml}</div>
        <div class="nav-buttons">
          <button class="btn-nav" onclick="prevQ()" ${currentIndex===0?'disabled':''}>◀ PREVIOUS</button>
          <button class="btn-submit" onclick="submitAnswer()">✓ SUBMIT ANSWER</button>
          <button class="btn-nav" onclick="nextQ()" ${currentIndex+1>=QUESTIONS.length?'disabled':''}>NEXT ▶</button>
        </div>
      </div>
      <div style="text-align:center;margin-top:1rem;"><span class="timer-display" id="timer-display">⏱️ ${m}:${s.toString().padStart(2,'0')}</span></div>`;
    renderProgress();
  }
  function renderAll() { if(answers.length===QUESTIONS.length) renderCompletion(); else renderCurrent(); }

  function renderCompletion() {
    endSession();
    let container=document.getElementById('main-container');
    let total=calcScore(), grade=getGrade(total);
    let results='';
    for(let i=0;i<QUESTIONS.length;i++) {
      let q=QUESTIONS[i];
      let ans=answers.find(a=>a.idx===i);
      let isCorrect=ans?ans.isCorrect:false;
      let userAnswer=ans?ans.text:'Not answered';
      results+=`<div style="background:rgba(13,27,42,0.5);border-radius:12px;padding:1rem;margin-bottom:0.75rem;border-left:3px solid ${isCorrect?'#2ec4b6':'#e63946'}">
        <div style="font-weight:600;">Q${i+1}: ${q.framework}</div>
        <div style="font-size:0.8rem;">Your answer: ${escapeHtml(userAnswer)}</div>
        <div style="font-size:0.75rem;color:${isCorrect?'#2ec4b6':'#e63946'}">${isCorrect?'✓ Correct':`✗ Incorrect (Correct: ${q.options[q.correct]})`} — ${ans?ans.pointsEarned:0}/${q.points} points</div>
      </div>`;
    }
    container.innerHTML=`<div class="question-card completion-card">
      <div class="completion-icon">✓</div>
      <h2>Case Study Complete!</h2>
      <p style="color:#7b8a9b;">You have completed all 10 questions.</p>
      <div style="background:rgba(69,179,255,0.1);padding:1.5rem;border-radius:16px;margin:1.5rem 0;">
        <div style="font-size:1.8rem;font-weight:700;color:#ffd166;">${total} / 100 points</div>
        <div class="grade-badge ${grade.class}" style="font-size:1rem;margin-top:0.5rem;">${grade.icon} ${grade.name}</div>
      </div>
      <div style="max-height:400px;overflow-y:auto;margin-bottom:1.5rem;text-align:left;">${results}</div>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <button class="btn-submit" style="width:auto;padding:0.8rem 1.5rem;" onclick="generateCertificate()">🏆 Download Certificate</button>
        <button class="btn-submit" style="width:auto;padding:0.8rem 1.5rem;background:#7b8a9b;" onclick="exitToJoin()">📋 Exit to Home</button>
      </div>
    </div>`;
  }

  async function saveToSupabase(participantName, participantEmail, totalScore, answersArray) {
    try {
      const sessionId = getSessionId();
      await supabase.rpc('set_app_session', { session_id: sessionId });
      const { error } = await supabase.from('participants').insert([{
        name: participantName,
        email: participantEmail,
        score: totalScore,
        answers: answersArray,
        session_id: sessionId,
        completed_at: new Date().toISOString(),
        device_info: navigator.userAgent
      }]);
      if (error) console.error('Supabase error:', error);
      else console.log('Saved to Supabase successfully');
    } catch (err) { console.error('Error saving to Supabase:', err); }
  }

  window.generateCertificate = async function() {
    const totalScore = calcScore();
    const grade = getGrade(totalScore);
    const playerName = currentPlayer ? currentPlayer.name : 'Participant';
    const playerEmail = currentPlayer ? currentPlayer.email : null;
    await saveToSupabase(playerName, playerEmail, totalScore, answers);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    doc.setFillColor(10,42,58); doc.rect(0,0,297,210,'F');
    doc.setFillColor(69,179,255); doc.rect(0,0,297,5,'F'); doc.rect(0,205,297,5,'F');
    doc.setDrawColor(255,209,102); doc.setLineWidth(1.5); doc.rect(10,10,277,190);
    doc.setDrawColor(69,179,255); doc.setLineWidth(0.5); doc.rect(13,13,271,184);
    doc.setFont('helvetica','bold'); doc.setFontSize(26); doc.setTextColor(255,209,102);
    doc.text('CERTIFICATE OF COMPLETION',148.5,45,{align:'center'});
    doc.setFontSize(10); doc.setTextColor(69,179,255);
    doc.text('Tara Air 9N-AET Human Factors Case Study',148.5,60,{align:'center'});
    doc.text('CAAN Mandatory Training',148.5,68,{align:'center'});
    doc.setFontSize(14); doc.setTextColor(255,255,255);
    doc.text('This certificate is presented to',148.5,92,{align:'center'});
    doc.setFontSize(24); doc.setTextColor(255,209,102);
    doc.text(playerName,148.5,112,{align:'center'});
    doc.setFontSize(11); doc.setTextColor(255,255,255);
    doc.text('for successful completion of the',148.5,132,{align:'center'});
    doc.setFontSize(12); doc.setTextColor(69,179,255);
    doc.text('Tara Air 9N-AET Human Factors Case Study',148.5,145,{align:'center'});
    doc.setFontSize(13); doc.setTextColor(255,209,102);
    const gradeText = grade.name === 'Completed with Distinction' ? 'DISTINCTION' : grade.name === 'Completed' ? 'COMPLETED' : 'ATTENDED';
    doc.text(`${gradeText} — ${totalScore}/100 points`,148.5,162,{align:'center'});
    const sigY = 182;
    doc.setDrawColor(255,209,102); doc.setLineWidth(0.5); doc.line(95,sigY,202,sigY);
    doc.setFont('helvetica','italic'); doc.setFontSize(14); doc.setTextColor(255,209,102);
    doc.text('Ghanshyam Acharya',148.5,sigY+6,{align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(123,138,155);
    doc.text('Instructor',148.5,sigY+14,{align:'center'});
    doc.setFontSize(8); doc.setTextColor(123,138,155);
    doc.text(`Issue Date: ${new Date().toLocaleDateString('en-GB')}`,148.5,sigY+24,{align:'center'});
    doc.setFontSize(6); doc.text('Training is not completion. Application is completion.',148.5,203,{align:'center'});
    doc.save(`Certificate_${playerName.replace(/[^a-z0-9]/gi,'_')}.pdf`);
  };

  window.exitToJoin = function() { if(confirm('Exit session? Progress saved.')) window.location.href='index.html'; };
  loadPlayer();
</script>
</body>
</html>
