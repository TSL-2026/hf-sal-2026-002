<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Factor Case Study | Tara Air 9N-AET</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
      color: #e0e1dd;
      min-height: 100vh;
    }
    .header { background: rgba(13,27,42,0.95); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo h1 { font-size: 1.2rem; background: linear-gradient(135deg, #fff 0%, #45b3ff 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo p { font-size: 0.6rem; color: #7b8a9b; }
    .player-info { text-align: right; }
    .player-name { font-size: 1rem; font-weight: 600; color: #ffd166; }
    .player-score { font-size: 0.75rem; color: #45b3ff; }
    .timer-display { font-size: 0.9rem; font-family: monospace; color: #ffd166; background: rgba(0,0,0,0.5); padding: 0.3rem 0.8rem; border-radius: 20px; display: inline-block; }
    .exit-btn, .cert-btn { background: transparent; border: 1px solid #7b8a9b; color: #7b8a9b; padding: 0.2rem 0.6rem; border-radius: 20px; cursor: pointer; font-size: 0.6rem; margin-left: 0.3rem; }
    .main-container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }
    .question-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; background: rgba(27,38,59,0.5); padding: 0.75rem; border-radius: 16px; }
    .grid-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(69,179,255,0.3); background: rgba(13,27,42,0.8); color: #e0e1dd; font-weight: 600; cursor: pointer; }
    .grid-btn.active { background: #45b3ff; color: white; }
    .grid-btn.correct { background: rgba(46,196,182,0.4); border-color: #2ec4b6; color: #2ec4b6; }
    .grid-btn.incorrect { background: rgba(230,57,70,0.4); border-color: #e63946; color: #e63946; }
    .progress-section { background: rgba(27,38,59,0.5); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; }
    .progress-bar-container { height: 8px; background: #2a2e3a; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #45b3ff, #2ec4b6); transition: width 0.3s; }
    .progress-text { font-size: 0.7rem; color: #7b8a9b; text-align: right; }
    .question-card { background: rgba(27,38,59,0.7); border: 1px solid rgba(69,179,255,0.2); border-radius: 24px; padding: 1.8rem; }
    .question-header { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(69,179,255,0.2); }
    .question-number { font-size: 0.7rem; color: #ffd166; }
    .question-points { font-size: 0.7rem; color: #45b3ff; background: rgba(69,179,255,0.1); padding: 0.2rem 0.6rem; border-radius: 20px; }
    .question-framework { font-size: 0.65rem; color: #7b8a9b; margin-bottom: 0.5rem; }
    .question-text { font-size: 1rem; font-weight: 500; margin-bottom: 1rem; }
    .scenario-box { background: rgba(13,27,42,0.5); border-left: 3px solid #45b3ff; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.85rem; }
    .options-grid { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; }
    .option-radio { display: flex; align-items: center; gap: 0.75rem; background: rgba(13,27,42,0.5); padding: 0.75rem 1rem; border-radius: 12px; cursor: pointer; }
    .option-radio input { accent-color: #45b3ff; width: 18px; height: 18px; }
    .nav-buttons { display: flex; gap: 1rem; justify-content: space-between; margin-top: 1rem; }
    .btn-nav { background: rgba(69,179,255,0.15); border: 1px solid rgba(69,179,255,0.3); color: #45b3ff; padding: 0.7rem 1.5rem; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .btn-submit { background: linear-gradient(135deg, #45b3ff, #1a6bc3); color: white; border: none; padding: 0.9rem; border-radius: 40px; font-weight: 600; cursor: pointer; flex: 2; }
    .completion-card { text-align: center; padding: 2rem; }
    .grade-badge { display: inline-block; padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.8rem; margin-top: 1rem; }
    .grade-distinction { background: rgba(46,196,182,0.2); color: #2ec4b6; }
    .grade-completed { background: rgba(69,179,255,0.2); color: #45b3ff; }
    .grade-attended { background: rgba(230,57,70,0.2); color: #e63946; }
    .success-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2ec4b6; color: #000; padding: 0.5rem 1rem; border-radius: 30px; font-size: 0.8rem; z-index: 2000; animation: fadeOut 3s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">
  <div class="logo"><h1>📋 HUMAN FACTOR CASE STUDY</h1><p>Tara Air 9N-AET | Pokhara → Jomsom • 29 May 2022</p></div>
  <div class="player-info">
    <div class="player-name" id="player-name">Loading...</div>
    <div class="player-score" id="player-score">Score: 0 pts</div>
    <div><button class="cert-btn" id="certBtn">🏆 Certificate</button><button class="exit-btn" id="exitBtn">✕ Exit</button></div>
  </div>
</div>

<div class="main-container" id="main-container"></div>

<script>
  const SUPABASE_URL = 'https://etxkdcrmttopdlasqmqk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0eGtkY3JtdHRvcGRsYXNxbXFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODU5MjAsImV4cCI6MjA5Njc2MTkyMH0.RrLVoHefTpHhhgH1Bc_IhZUGGrmmq9QilqDt-QbE6tk';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const QUESTIONS = [
    { id:1, framework:"Dirty Dozen", scenario:"Captain hesitant but passenger/ground crew advises strongly to continue.", question:"Which Dirty Dozen factor is most clearly at work?", options:["Pressure","Complacency","Lack of assertiveness","Norms"], correct:0, points:10 },
    { id:2, framework:"Normalization of Deviance", scenario:"TAWS inhibited due to nuisance warnings. Crew got used to flying without it.", question:"This reflects which concept?", options:["Plan continuation bias","Normalization of deviance","Confirmation bias","Sunk cost fallacy"], correct:1, points:10 },
    { id:3, framework:"Authority Gradient", scenario:"Captain:17,500 hrs, FO:520 hrs.", question:"What authority gradient issue is most likely?", options:["Too flat","Too steep","Optimal","Reversed"], correct:1, points:10 },
    { id:4, framework:"Situational Awareness", scenario:"Aircraft entered IMC while trying to stay VFR.", question:"Which level of SA failed first?", options:["Level 1 Perception","Level 2 Comprehension","Level 3 Projection","All three"], correct:2, points:10 },
    { id:5, framework:"Decision Bias", scenario:"Captain criticized others flying VFR in bad weather, yet continued.", question:"Which bias best explains this?", options:["Confirmation","Anchoring","Plan continuation","Overconfidence"], correct:2, points:10 },
    { id:6, framework:"Swiss Cheese", scenario:"Multiple failures: TAWS inhibited + bad weather + hesitant captain + poor CRM.", question:"How many defensive layers failed?", options:["2","3","4","5+"], correct:3, points:10 },
    { id:7, framework:"Psychological Safety", scenario:"FO (520 hrs) did not challenge captain (17,500 hrs).", question:"What does this indicate?", options:["Excellent safety","FO incompetent","Low safety","Irrelevant"], correct:2, points:10 },
    { id:8, framework:"Just Culture", scenario:"Captain made poor decision but was not malicious.", question:"How should this be classified?", options:["Reckless","Human error","At-risk behaviour","Criminal"], correct:2, points:10 },
    { id:9, framework:"Drift into Failure", scenario:"TAWS inhibited for months, weather minima pushed.", question:"What is this slow erosion called?", options:["Swiss Cheese","Normalization of deviance","Drift into failure","Plan continuation"], correct:2, points:10 },
    { id:10, framework:"Accident Chain", scenario:"Route economics → Marginal weather policy → No TAWS → CFIT.", question:"Where did the accident begin?", options:["Frontline","Cockpit","Executive desk","Regulator"], correct:2, points:10 }
  ];

  let currentPlayer = null, currentIndex = 0, answers = [], sessionEnd = null, timer = null, sessionActive = true;
  let supabaseRecordId = null;

  function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
  function showMsg(msg) { let d=document.createElement('div'); d.className='success-message'; d.textContent=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }
  function getGrade(score) { if(score>=80) return {name:"Distinction",class:"grade-distinction",icon:"🏆"}; if(score>=70) return {name:"Completed",class:"grade-completed",icon:"✅"}; return {name:"Attended",class:"grade-attended",icon:"📋"}; }
  function calcScore() { return answers.reduce((s,a)=>s+(a.isCorrect?QUESTIONS[a.idx].points:0),0); }
  function updateScore() { let total=calcScore(); let g=getGrade(total); document.getElementById('player-score').innerHTML=`Score: ${total} pts <span style="font-size:0.65rem;">${g.icon}</span>`; if(currentPlayer) { currentPlayer.score=total; localStorage.setItem('hf-current-player',JSON.stringify(currentPlayer)); } }

  function saveLocal() { localStorage.setItem(`tara-answers-${currentPlayer.id}`,JSON.stringify(answers)); updateScore(); }

  // ========== SUPABASE SAVE (UPSERT) ==========
  async function saveToSupabase(progressPercent = null) {
    if (!currentPlayer) return;
    try {
      const totalScore = calcScore();
      const grade = getGrade(totalScore);
      const completedCount = answers.length;
      const percentComplete = progressPercent !== null ? progressPercent : (completedCount / QUESTIONS.length) * 100;
      let status = 'started';
      if (completedCount === QUESTIONS.length) status = grade.name.toLowerCase();
      else if (completedCount > 0) status = 'in_progress';
      
      const record = {
        name: currentPlayer.name,
        email: currentPlayer.email,
        score: totalScore,
        grade: grade.name,
        status: status,
        progress_percent: Math.round(percentComplete),
        answers_count: completedCount,
        total_questions: QUESTIONS.length,
        answers: answers,
        session_id: getSessionId(),
        updated_at: new Date().toISOString()
      };
      
      if (!supabaseRecordId) {
        // Insert new record
        const { data, error } = await supabase.from('participants').insert([record]).select();
        if (error) throw error;
        if (data && data[0]) supabaseRecordId = data[0].id;
        console.log('Inserted to Supabase:', record);
      } else {
        // Update existing record
        const { error } = await supabase.from('participants').update(record).eq('id', supabaseRecordId);
        if (error) throw error;
        console.log('Updated Supabase:', record);
      }
    } catch (err) { console.error('Supabase error:', err); }
  }

  function getSessionId() { 
    let id = localStorage.getItem('hf-session-id'); 
    if (!id) { id = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); localStorage.setItem('hf-session-id', id); } 
    return id; 
  }

  function startTimer() { if(timer) clearInterval(timer); sessionEnd=localStorage.getItem('hf-session-end-time'); if(!sessionEnd){ sessionEnd=Date.now()+30*60*1000; localStorage.setItem('hf-session-end-time',sessionEnd); } timer=setInterval(()=>{ let left=sessionEnd-Date.now(); if(left<=0 && sessionActive) endSession(); else if(sessionActive){ let m=Math.floor(left/60000),s=Math.floor((left%60000)/1000); let el=document.getElementById('timer-display'); if(el) el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`; } },1000); }
  function endSession() { sessionActive=false; clearInterval(timer); renderCompletion(); }

  async function loadPlayer() {
    let saved=localStorage.getItem('hf-current-player');
    if(!saved){ window.location.href='index.html'; return; }
    currentPlayer=JSON.parse(saved);
    document.getElementById('player-name').textContent=currentPlayer.name;
    let savedAns=localStorage.getItem(`tara-answers-${currentPlayer.id}`);
    if(savedAns) answers=JSON.parse(savedAns);
    
    // Check if already saved to Supabase
    let existingId = localStorage.getItem(`supabase-id-${currentPlayer.id}`);
    if (existingId) supabaseRecordId = existingId;
    
    // Save initial record to Supabase (if not exists)
    await saveToSupabase();
    
    startTimer();
    renderAll();
  }

  function getAnswerStatus(idx) { let a=answers.find(a=>a.idx===idx); if(!a) return 'not-answered'; return a.isCorrect?'correct':'incorrect'; }
  
  function renderGrid() {
    let html='<div class="question-grid">';
    for(let i=0;i<QUESTIONS.length;i++) html+=`<button class="grid-btn ${getAnswerStatus(i)} ${currentIndex===i?'active':''}" onclick="goTo(${i})">${i+1}</button>`;
    html+='</div>';
    let old=document.getElementById('qgrid'); if(old) old.remove();
    let pc=document.getElementById('progress-section');
    if(pc){ let div=document.createElement('div'); div.id='qgrid'; div.innerHTML=html; pc.parentNode.insertBefore(div,pc); }
  }
  
  function renderProgress() {
    let pc=document.getElementById('progress-section'); if(!pc) return;
    let pct=(answers.length/QUESTIONS.length)*100;
    pc.innerHTML=`<div class="progress-bar-container"><div class="progress-fill" style="width:${pct}%;"></div></div><div class="progress-text">Questions: ${answers.length}/${QUESTIONS.length} | Score: ${calcScore()}/100</div>`;
    renderGrid();
  }
  
  window.goTo = function(i) { if(i>=0 && i<QUESTIONS.length){ currentIndex=i; renderCurrent(); } };
  
  async function submitAndStay() {
    let sel=document.querySelector('input[name="answer"]:checked');
    if(!sel){ showMsg('⚠️ Select an answer'); return false; }
    let selIdx=parseInt(sel.value), q=QUESTIONS[currentIndex], isCorrect=(selIdx===q.correct), pts=isCorrect?q.points:0;
    let existing=answers.findIndex(a=>a.idx===currentIndex);
    let newAns={ idx:currentIndex, qid:q.id, answer:selIdx, text:q.options[selIdx], isCorrect:isCorrect, points:pts };
    if(existing!==-1) answers[existing]=newAns; else answers.push(newAns);
    saveLocal();
    await saveToSupabase();
    showMsg(isCorrect?`✓ Correct! +${pts}`:`✗ Incorrect. Correct: ${q.options[q.correct]}`);
    renderProgress();
    return true;
  }
  
  window.submitAnswer = function() { if(submitAndStay()){ if(currentIndex+1<QUESTIONS.length){ currentIndex++; renderCurrent(); } else { renderCompletion(); } } };
  window.prevQ = function() { if(currentIndex>0){ currentIndex--; renderCurrent(); } };
  window.nextQ = function() { if(currentIndex+1<QUESTIONS.length){ currentIndex++; renderCurrent(); } };

  function renderCurrent() {
    let container=document.getElementById('main-container');
    let q=QUESTIONS[currentIndex], existing=answers.find(a=>a.idx===currentIndex);
    let left=sessionEnd?Math.max(0,(sessionEnd-Date.now())/1000):1800, m=Math.floor(left/60), s=Math.floor(left%60);
    let optsHtml='';
    q.options.forEach((opt,idx)=>{ let checked=(existing && existing.answer===idx)?'checked':''; optsHtml+=`<label class="option-radio"><input type="radio" name="answer" value="${idx}" ${checked}><span class="option-text">${escapeHtml(opt)}</span></label>`; });
    container.innerHTML=`<div class="progress-section" id="progress-section"></div>
      <div class="question-card">
        <div class="question-header"><span class="question-number">Question ${currentIndex+1}/${QUESTIONS.length}</span><span class="question-points">${q.points} points</span></div>
        <div class="question-framework">${escapeHtml(q.framework)}</div>
        <div class="scenario-box">📖 ${escapeHtml(q.scenario)}</div>
        <div class="question-text">${escapeHtml(q.question)}</div>
        <div class="options-grid">${optsHtml}</div>
        <div class="nav-buttons">
          <button class="btn-nav" onclick="prevQ()" ${currentIndex===0?'disabled':''}>◀ PREVIOUS</button>
          <button class="btn-submit" onclick="submitAnswer()">✓ SUBMIT</button>
          <button class="btn-nav" onclick="nextQ()" ${currentIndex+1>=QUESTIONS.length?'disabled':''}>NEXT ▶</button>
        </div>
      </div>
      <div style="text-align:center;margin-top:1rem;"><span class="timer-display" id="timer-display">⏱️ ${m}:${s.toString().padStart(2,'0')}</span></div>`;
    renderProgress();
  }
  
  function renderAll() { if(answers.length===QUESTIONS.length) renderCompletion(); else renderCurrent(); }

  async function renderCompletion() {
    endSession();
    await saveToSupabase(); // Final save
    let total=calcScore(), grade=getGrade(total);
    let results='';
    for(let i=0;i<QUESTIONS.length;i++) {
      let q=QUESTIONS[i], ans=answers.find(a=>a.idx===i);
      let isCorrect=ans?ans.isCorrect:false;
      results+=`<div style="background:rgba(13,27,42,0.5);border-radius:12px;padding:1rem;margin-bottom:0.75rem;border-left:3px solid ${isCorrect?'#2ec4b6':'#e63946'}">
        <div>Q${i+1}: ${q.framework}</div>
        <div>Your answer: ${escapeHtml(ans?ans.text:'Not answered')}</div>
        <div>${isCorrect?'✓ Correct':'✗ Incorrect'} (${ans?ans.points:0}/${q.points} pts)</div>
      </div>`;
    }
    document.getElementById('main-container').innerHTML=`<div class="question-card completion-card">
      <div style="font-size:3rem;">✓</div>
      <h2>Case Study Complete!</h2>
      <div style="background:rgba(69,179,255,0.1);padding:1.5rem;border-radius:16px;margin:1rem 0;">
        <div style="font-size:1.8rem;font-weight:700;color:#ffd166;">${total} / 100 points</div>
        <div class="grade-badge ${grade.class}">${grade.icon} ${grade.name}</div>
      </div>
      <div style="max-height:300px;overflow-y:auto;text-align:left;margin:1rem 0;">${results}</div>
      <div style="display:flex;gap:1rem;justify-content:center;">
        <button class="btn-submit" id="completionCertBtn" style="width:auto;padding:0.8rem 1.5rem;">🏆 Certificate</button>
        <button class="btn-submit" id="completionExitBtn" style="width:auto;padding:0.8rem 1.5rem;background:#7b8a9b;">📋 Exit</button>
      </div>
    </div>`;
    document.getElementById('completionCertBtn')?.addEventListener('click', generateCertificate);
    document.getElementById('completionExitBtn')?.addEventListener('click', exitToJoin);
  }

  window.generateCertificate = async function() {
    await saveToSupabase();
    const total = calcScore();
    const grade = getGrade(total);
    const playerName = currentPlayer ? currentPlayer.name : 'Participant';
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    doc.setFillColor(10,42,58); doc.rect(0,0,297,210,'F');
    doc.setFillColor(69,179,255); doc.rect(0,0,297,5,'F'); doc.rect(0,205,297,5,'F');
    doc.setDrawColor(255,209,102); doc.setLineWidth(1.5); doc.rect(10,10,277,190);
    doc.setDrawColor(69,179,255); doc.setLineWidth(0.5); doc.rect(13,13,271,184);
    doc.setFont('helvetica','bold'); doc.setFontSize(26); doc.setTextColor(255,209,102);
    doc.text('CERTIFICATE OF COMPLETION',148.5,45,{align:'center'});
    doc.setFontSize(10); doc.setTextColor(69,179,255);
    doc.text('Human Factor Case Study — Tara Air 9N-AET',148.5,60,{align:'center'});
    doc.text('CAAN Mandatory Training',148.5,68,{align:'center'});
    doc.setFontSize(14); doc.setTextColor(255,255,255);
    doc.text('This certificate is presented to',148.5,92,{align:'center'});
    doc.setFontSize(24); doc.setTextColor(255,209,102);
    doc.text(playerName,148.5,112,{align:'center'});
    doc.setFontSize(11); doc.setTextColor(255,255,255);
    doc.text('for successful completion of the',148.5,132,{align:'center'});
    doc.setFontSize(12); doc.setTextColor(69,179,255);
    doc.text('Human Factor Case Study — Tara Air 9N-AET',148.5,145,{align:'center'});
    doc.setFontSize(13); doc.setTextColor(255,209,102);
    const gradeText = grade.name === 'Distinction' ? 'DISTINCTION' : grade.name === 'Completed' ? 'COMPLETED' : 'ATTENDED';
    doc.text(`${gradeText} — ${total}/100 points`,148.5,162,{align:'center'});
    doc.setDrawColor(255,209,102); doc.setLineWidth(0.5); doc.line(95,182,202,182);
    doc.setFont('helvetica','italic'); doc.setFontSize(14); doc.setTextColor(255,209,102);
    doc.text('Ghanshyam Acharya',148.5,188,{align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(123,138,155);
    doc.text('Instructor',148.5,196,{align:'center'});
    doc.setFontSize(8); doc.text(`Issue Date: ${new Date().toLocaleDateString('en-GB')}`,148.5,204,{align:'center'});
    doc.save(`Certificate_${playerName.replace(/[^a-z0-9]/gi,'_')}.pdf`);
  };

  window.exitToJoin = function() { if(confirm('Exit? Progress saved.')) window.location.href = 'index.html'; };
  
  document.getElementById('certBtn')?.addEventListener('click', generateCertificate);
  document.getElementById('exitBtn')?.addEventListener('click', exitToJoin);
  
  loadPlayer();
</script>
</body>
</html>
