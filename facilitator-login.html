<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facilitator Login | Tara Air</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
      color: #e0e1dd;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-container { max-width: 450px; width: 100%; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 2.5rem; background: linear-gradient(135deg, #fff 0%, #45b3ff 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo .subtitle { font-size: 0.7rem; color: #ffd166; }
    .card { background: rgba(27,38,59,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(69,179,255,0.25); border-radius: 28px; padding: 2rem; }
    .card h2 { color: #fff; text-align: center; }
    .card-sub { font-size: 0.7rem; color: #7b8a9b; text-align: center; margin-bottom: 1.5rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.7rem; font-weight: 600; color: #ffd166; margin-bottom: 0.5rem; }
    .input-group input { width: 100%; padding: 1rem; background: rgba(13,27,42,0.8); border: 1px solid rgba(69,179,255,0.3); border-radius: 14px; color: #e0e1dd; font-size: 1rem; outline: none; }
    .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #45b3ff, #1a6bc3); color: white; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
    .btn:hover { transform: translateY(-2px); }
    .error { background: rgba(230,57,70,0.2); border: 1px solid #e63946; border-radius: 12px; padding: 0.75rem; margin-bottom: 1rem; text-align: center; font-size: 0.8rem; color: #e63946; display: none; }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.6rem; color: #5a6e84; }
    .footer a { color: #5a6e84; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-container">
  <div class="logo"><h1>🔐 FACILITATOR PORTAL</h1><div class="subtitle">Tara Air 9N-AET</div></div>
  <div class="card">
    <h2>Login to Dashboard</h2>
    <div class="card-sub">Authorized access only</div>
    <div id="errorMsg" class="error">⚠️ Incorrect password</div>
    <div class="input-group"><label>🔑 ACCESS CODE</label><input type="password" id="password" placeholder="Enter facilitator password"></div>
    <button class="btn" onclick="login()">▶ ACCESS DASHBOARD</button>
  </div>
  <div class="footer"><a href="index.html">← Back to Participant Page</a></div>
</div>
<script>
  const FACILITATOR_PASSWORD = "tara2026";
  function login() {
    const pwd = document.getElementById('password').value;
    if (pwd === FACILITATOR_PASSWORD) {
      sessionStorage.setItem('facilitator-authenticated', 'true');
      window.location.href = 'facilitator.html';
    } else {
      document.getElementById('errorMsg').style.display = 'block';
      setTimeout(() => { document.getElementById('errorMsg').style.display = 'none'; }, 3000);
    }
  }
  document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
