<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facilitator Dashboard | Tara Air</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a2a3a 0%, #0d1b2a 50%, #1b263b 100%);
      color: #e0e1dd;
      min-height: 100vh;
    }
    .header { background: rgba(13,27,42,0.95); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .logo h1 { font-size: 1.3rem; background: linear-gradient(135deg, #fff 0%, #45b3ff 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn-exit { background: transparent; border: 1px solid #7b8a9b; color: #7b8a9b; padding: 0.3rem 1rem; border-radius: 20px; cursor: pointer; }
    .main-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .card { background: rgba(27,38,59,0.7); border: 1px solid rgba(69,179,255,0.2); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(69,179,255,0.2); }
    .card-title { font-size: 1.2rem; font-weight: 600; color: #ffd166; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid rgba(69,179,255,0.2); }
    th { color: #ffd166; font-size: 0.7rem; text-transform: uppercase; }
    .grade-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.65rem; }
    .grade-distinction { background: rgba(46,196,182,0.2); color: #2ec4b6; }
    .grade-completed { background: rgba(69,179,255,0.2); color: #45b3ff; }
    .grade-attended { background: rgba(230,57,70,0.2); color: #e63946; }
    .empty-state { text-align: center; padding: 2rem; color: #7b8a9b; }
    .btn { background: rgba(69,179,255,0.15); border: 1px solid rgba(69,179,255,0.3); color: #45b3ff; padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; margin-right: 0.5rem; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo"><h1>📊 HUMAN FACTOR CASE STUDY</h1><p>Tara Air 9N-AET | Facilitator Dashboard</p></div>
  <button class="btn-exit" onclick="logout()">← Logout</button>
</div>
<div class="main-container" id="main-container">
  <div class="card">
    <div class="card-header"><span class="card-title">📋 Participant Results</span></div>
    <div id="participants-list">
      <div class="empty-state">Loading participants from localStorage...</div>
    </div>
    <div style="margin-top: 1rem;">
      <button class="btn" onclick="exportCSV()">📄 Export CSV</button>
      <button class="btn" onclick="clearAll()">🗑️ Clear All Data</button>
    </div>
  </div>
</div>
<script>
  function getGrade(score) { if (score >= 80) return { name: "Distinction", class: "grade-distinction", icon: "🏆" }; if (score >= 70) return { name: "Completed", class: "grade-completed", icon: "✅" }; return { name: "Attended", class: "grade-attended", icon: "📋" }; }

  function loadParticipants() {
    let participants = JSON.parse(localStorage.getItem('hf-participants') || '[]');
    let container = document.getElementById('participants-list');
    if (participants.length === 0) {
      container.innerHTML = '<div class="empty-state">No participants have joined yet.</div>';
      return;
    }
    let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Score</th><th>Grade</th><th>Joined</th></tr></thead><tbody>';
    participants.forEach(p => {
      let grade = getGrade(p.score || 0);
      html += `<tr><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.email || '-')}</td><td><strong>${p.score || 0}</strong> / 100</td><td><span class="grade-badge ${grade.class}">${grade.icon} ${grade.name}</span></td><td>${new Date(p.joinedAt).toLocaleString()}</td></tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function exportCSV() {
    let participants = JSON.parse(localStorage.getItem('hf-participants') || '[]');
    let csv = "Name,Email,Score,Grade,Joined\n";
    participants.forEach(p => {
      let grade = getGrade(p.score || 0).name;
      csv += `"${p.name}","${p.email || ''}",${p.score || 0},"${grade}","${p.joinedAt}"\n`;
    });
    let blob = new Blob([csv], { type: 'text/csv' });
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `participants_${new Date().toISOString().slice(0,19)}.csv`;
    a.click();
  }

  function clearAll() {
    if (confirm('⚠️ Delete ALL participant data? This cannot be undone.')) {
      localStorage.removeItem('hf-participants');
      localStorage.removeItem('hf-current-player');
      loadParticipants();
      alert('All participant data cleared.');
    }
  }

  function logout() { window.location.href = 'index.html'; }
  function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }

  loadParticipants();
  setInterval(loadParticipants, 5000);
</script>
</body>
</html>
